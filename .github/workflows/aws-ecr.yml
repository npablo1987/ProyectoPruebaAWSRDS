name: build and push para AWS ECR - ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el Codigo
        uses: actions/checkout@v4

      - name: Configurar AWS Credenciales
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push servicio FastApi
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          echo "Building FastAPI with tag: $IMAGE_TAG"
          docker build --no-cache -t servicio2 ./servicio2
          docker tag servicio2:latest 705690519982.dkr.ecr.us-east-2.amazonaws.com/serviciofastapi:$IMAGE_TAG
          docker tag servicio2:latest 705690519982.dkr.ecr.us-east-2.amazonaws.com/serviciofastapi:latest
          docker push 705690519982.dkr.ecr.us-east-2.amazonaws.com/serviciofastapi:$IMAGE_TAG
          docker push 705690519982.dkr.ecr.us-east-2.amazonaws.com/serviciofastapi:latest
          echo "FASTAPI_IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Ver nginx.conf Angular
        run: |
          cat ./ServicioAngular/nginx.conf

      - name: Build y push Servicio Angular
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          echo "Building Angular with tag: $IMAGE_TAG"
          docker build --no-cache -t servicioangular ./ServicioAngular
          docker tag servicioangular:latest 705690519982.dkr.ecr.us-east-2.amazonaws.com/servicioangular:$IMAGE_TAG
          docker tag servicioangular:latest 705690519982.dkr.ecr.us-east-2.amazonaws.com/servicioangular:latest
          docker push 705690519982.dkr.ecr.us-east-2.amazonaws.com/servicioangular:$IMAGE_TAG
          docker push 705690519982.dkr.ecr.us-east-2.amazonaws.com/servicioangular:latest
          echo "ANGULAR_IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Obtener Task Definition de FastAPI
        run: |
          aws ecs describe-services \
            --cluster clusterpv \
            --services ServicioFastApi-task-service-6qik50ub \
            --query 'services[0].taskDefinition' \
            --output text > fastapi-task-arn.txt
          
          TASK_DEF=$(cat fastapi-task-arn.txt)
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF \
            --query 'taskDefinition' > fastapi-task-def.json

      - name: Actualizar imagen en Task Definition FastAPI
        run: |
          NEW_IMAGE="705690519982.dkr.ecr.us-east-2.amazonaws.com/serviciofastapi:$FASTAPI_IMAGE_TAG"
          echo "Actualizando FastAPI a imagen: $NEW_IMAGE"
          
          jq --arg IMAGE "$NEW_IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | 
            .containerDefinitions[0].image = $IMAGE' \
            fastapi-task-def.json > fastapi-task-def-new.json
          
          cat fastapi-task-def-new.json

      - name: Registrar nueva Task Definition FastAPI
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://fastapi-task-def-new.json

      - name: Actualizar servicio FastAPI con nueva Task Definition
        run: |
          aws ecs update-service \
            --cluster clusterpv \
            --service ServicioFastApi-task-service-6qik50ub \
            --force-new-deployment

      - name: Obtener Task Definition de Angular
        run: |
          aws ecs describe-services \
            --cluster clusterpv \
            --services ServicioAngularTalk-service-7o7xzr82 \
            --query 'services[0].taskDefinition' \
            --output text > angular-task-arn.txt
          
          TASK_DEF=$(cat angular-task-arn.txt)
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF \
            --query 'taskDefinition' > angular-task-def.json

      - name: Actualizar imagen en Task Definition Angular
        run: |
          NEW_IMAGE="705690519982.dkr.ecr.us-east-2.amazonaws.com/servicioangular:$ANGULAR_IMAGE_TAG"
          echo "Actualizando Angular a imagen: $NEW_IMAGE"
          
          jq --arg IMAGE "$NEW_IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | 
            .containerDefinitions[0].image = $IMAGE' \
            angular-task-def.json > angular-task-def-new.json
          
          cat angular-task-def-new.json

      - name: Registrar nueva Task Definition Angular
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://angular-task-def-new.json

      - name: Actualizar servicio Angular con nueva Task Definition
        run: |
          aws ecs update-service \
            --cluster clusterpv \
            --service ServicioAngularTalk-service-7o7xzr82 \
            --force-new-deployment

      - name: Verificar estado del despliegue FastAPI
        continue-on-error: true
        run: |
          echo "Verificando estado del servicio FastAPI..."
          aws ecs describe-services \
            --cluster clusterpv \
            --services ServicioFastApi-task-service-6qik50ub \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,Deployments:deployments[*].{Status:status,TaskDef:taskDefinition,Running:runningCount,Desired:desiredCount}}' \
            --output json
          
          echo "Eventos recientes del servicio FastAPI:"
          aws ecs describe-services \
            --cluster clusterpv \
            --services ServicioFastApi-task-service-6qik50ub \
            --query 'services[0].events[0:5]' \
            --output table

      - name: Verificar estado del despliegue Angular
        continue-on-error: true
        run: |
          echo "Verificando estado del servicio Angular..."
          aws ecs describe-services \
            --cluster clusterpv \
            --services ServicioAngularTalk-service-7o7xzr82 \
            --query 'services[0].{Status:status,Running:runningCount,Desired:desiredCount,Deployments:deployments[*].{Status:status,TaskDef:taskDefinition,Running:runningCount,Desired:desiredCount}}' \
            --output json
          
          echo "Eventos recientes del servicio Angular:"
          aws ecs describe-services \
            --cluster clusterpv \
            --services ServicioAngularTalk-service-7o7xzr82 \
            --query 'services[0].events[0:5]' \
            --output table